esphome:
  name: dis08070h-lvgl
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: backlight
          brightness: 35%

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

captive_portal:

output:
  - platform: ledc
    pin: GPIO2
    frequency: 1220
    id: backlight_pwm

light:
  - platform: monochromatic
    id: backlight
    name: "Display Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

i2c:
  sda: GPIO19
  scl: GPIO20
  scan: true

font:
  - file: "gfonts://Roboto"
    id: font_title
    size: 36
  - file: "gfonts://Roboto"
    id: font_button
    size: 28
  - file: "gfonts://Roboto"
    id: font_status
    size: 24

display:
  - platform: rpi_dpi_rgb
    id: main_display
    data_pins:
      red: [14, 21, 47, 48, 45]
      green: [9, 46, 3, 8, 16, 1]
      blue: [15, 7, 6, 5, 4]
    de_pin: 41
    hsync_pin: 39
    vsync_pin: 40
    pclk_pin: 0

    hsync_front_porch: 40
    hsync_pulse_width: 48
    hsync_back_porch: 13

    vsync_front_porch: 1
    vsync_pulse_width: 31
    vsync_back_porch: 13

    pclk_inverted: true
    color_order: RGB
    auto_clear_enabled: false
    update_interval: never

    dimensions:
      width: 800
      height: 480

touchscreen:
  platform: gt911
  id: main_touch
  display: main_display

lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touch

  bg_color: 0x202020
  border_width: 0
  outline_width: 0
  shadow_width: 0

  pages:
    - id: main_page
      widgets:
        - label:
            id: title_label
            x: 30
            y: 20
            text: "CrowPanel LVGL Test"
            text_font: font_title
            text_color: 0xFFFFFF

        - button:
            id: btn_left
            x: 60
            y: 120
            width: 280
            height: 140
            bg_color: 0x1D4ED8
            radius: 16
            widgets:
              - label:
                  align: CENTER
                  text: "Button 1"
                  text_font: font_button
                  text_color: 0xFFFFFF
            on_click:
              - lvgl.label.update:
                  id: status_label
                  text: "Button 1 gedrueckt"

        - button:
            id: btn_right
            x: 460
            y: 120
            width: 280
            height: 140
            bg_color: 0xDC2626
            radius: 16
            widgets:
              - label:
                  align: CENTER
                  text: "Button 2"
                  text_font: font_button
                  text_color: 0xFFFFFF
            on_click:
              - lvgl.label.update:
                  id: status_label
                  text: "Button 2 gedrueckt"

        - label:
            id: status_label
            x: 30
            y: 320
            text: "Bereit"
            text_font: font_status
            text_color: 0xFFFFFF
