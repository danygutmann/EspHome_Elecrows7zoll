esphome:
  name: dis08070h-minimal
  friendly_name: dis08070h-minimal
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: backlight
          brightness: 35%

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: octal
  speed: 80MHz

logger:
  level: DEBUG

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

captive_portal:

output:
  - platform: ledc
    pin: GPIO2
    frequency: 1220
    id: backlight_pwm

light:
  - platform: monochromatic
    id: backlight
    name: "Display Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON
    default_transition_length: 0s

i2c:
  sda: GPIO19
  scl: GPIO20
  scan: true

font:
  - file: "gfonts://Roboto"
    id: my_font
    size: 36

display:
  - platform: rpi_dpi_rgb
    id: main_display
    data_pins:
      red: [14, 21, 47, 48, 45]
      green: [9, 46, 3, 8, 16, 1]
      blue: [15, 7, 6, 5, 4]
    de_pin: 41
    hsync_pin: 39
    vsync_pin: 40
    pclk_pin: 0

    hsync_front_porch: 40
    hsync_pulse_width: 48
    hsync_back_porch: 13 # 40 in Specs Original is 13

    vsync_front_porch: 1
    vsync_pulse_width: 31
    vsync_back_porch: 13

    pclk_inverted: true
    color_order: RGB
    auto_clear_enabled: false
    update_interval: 30s
    dimensions:
      width: 800
      height: 480
      
    lambda: |-
      it.fill(Color(255, 0, 0));
      it.rectangle(10, 10, 780, 460, Color(255, 255, 255));
      it.print(40, 40, id(my_font), Color(255, 255, 255), "DIS08070H");

touchscreen:
  platform: gt911
  id: main_touch
  display: main_display
  on_touch:
    then:
      - lambda: |-
          ESP_LOGI("touch", "TOUCH x=%d y=%d", touch.x, touch.y);
  on_release:
    then:
      - logger.log: "TOUCH losgelassen"
